name: kolss-platform
region: fra
# Alternative EU region: ams

domains:
  - domain: api.kolss.eu
    type: PRIMARY

services:
  - name: api
    dockerfile_path: Dockerfile
    # Default image stage "both" includes /usr/local/bin/api and /usr/local/bin/worker
    run_command: api
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health/live
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: HTTP_ADDR
        value: ":8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: CORS_ALLOWED_ORIGINS
        value: "https://crm.kolss.eu,http://localhost:4200"
      - key: PUBLIC_SITE_FORMS_ENABLED
        value: "false"
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_JWKS_URL
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_JWT_ISSUER
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_SHEETS_IMPORT_SECRET_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_SHEETS_IMPORT_SECRET_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: TURNSTILE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TURNSTILE_ALLOWED_HOSTNAMES
        scope: RUN_TIME
        type: GENERAL
      - key: TURNSTILE_EXPECTED_ACTION
        value: "lead_submission"
      - key: SUBMISSION_TOKEN_PEPPER
        scope: RUN_TIME
        type: SECRET
      - key: BOTCHECK_DISABLED
        value: "false"
      - key: STORAGE_QUARANTINE_BUCKET
        value: "lead-uploads-quarantine"
      - key: SUPABASE_S3_ENDPOINT
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_S3_REGION
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_S3_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CRM_SITE_URL_PUBLIC
        value: "https://crm.kolss.eu"
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_CHAT_ID_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_ADDITIONAL_CHAT_IDS_KYIV
        value: "-1002833157899"
      - key: TELEGRAM_CHAT_ID_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_WEBHOOK_URL_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_WEBHOOK_URL_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: SUBMISSION_TTL_MINUTES
        value: "60"
      - key: PRESIGN_TTL_MINUTES
        value: "10"
      - key: SHUTDOWN_TIMEOUT_SECONDS
        value: "10"

workers:
  - name: worker
    dockerfile_path: Dockerfile
    run_command: worker
    instance_count: 1
    instance_size_slug: basic-xxs
    # Internal health endpoint (not publicly routed)
    envs:
      - key: WORKER_HEALTH_ADDR
        value: ":8081"
      - key: WORKER_CLEANUP_INTERVAL_SECONDS
        value: "60"
      - key: WORKER_SCAN_INTERVAL_SECONDS
        value: "15"
      - key: WORKER_NOTIFY_INTERVAL_SECONDS
        value: "10"
      - key: WORKER_NOTIFY_BATCH_SIZE
        value: "20"
      - key: WORKER_SITE_JOBS_ENABLED
        value: "false"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: CRM_SITE_URL_PUBLIC
        value: "https://crm.kolss.eu"
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_CHAT_ID_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_CHAT_ID_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_WEBHOOK_URL_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_WEBHOOK_URL_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: SHUTDOWN_TIMEOUT_SECONDS
        value: "10"
      - key: BOTCHECK_DISABLED
        value: "false"
