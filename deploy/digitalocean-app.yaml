name: kolss-platform
region: fra
# Alternative EU region: ams

domains:
  - domain: api.kolss.eu
    type: PRIMARY

services:
  - name: api
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health/live
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: HTTP_ADDR
        value: ":8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: CORS_ALLOWED_ORIGINS
        value: "https://crm.kolss.eu,http://localhost:4200"
      - key: PUBLIC_SITE_FORMS_ENABLED
        value: "false"
      - key: NOTIFICATION_DISPATCHER_ENABLED
        value: "true"
      - key: NOTIFICATION_SWEEP_INTERVAL_MINUTES
        value: "60"
      - key: NOTIFICATION_BATCH_SIZE
        value: "20"
      - key: DAILY_REPORT_ENABLED
        value: "true"
      - key: DAILY_REPORT_HOUR_LOCAL
        value: "9"
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_JWKS_URL
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_JWT_ISSUER
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_SHEETS_IMPORT_SECRET_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_SHEETS_IMPORT_SECRET_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: TURNSTILE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TURNSTILE_ALLOWED_HOSTNAMES
        scope: RUN_TIME
        type: GENERAL
      - key: TURNSTILE_EXPECTED_ACTION
        value: "lead_submission"
      - key: BOTCHECK_DISABLED
        value: "false"
      - key: SUPABASE_S3_ENDPOINT
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_S3_REGION
        scope: RUN_TIME
        type: GENERAL
      - key: SUPABASE_S3_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CRM_SITE_URL_PUBLIC
        value: "https://crm.kolss.eu"
      - key: DEEPL_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_CHAT_ID_KYIV
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_ADDITIONAL_CHAT_IDS_KYIV
        value: "-1002833157899"
      - key: TELEGRAM_CHAT_ID_WARSAW
        scope: RUN_TIME
        type: SECRET
      - key: SHUTDOWN_TIMEOUT_SECONDS
        value: "10"
